<div class="loader-container" #loaderContainer>
  <!-- Curtains with added depth and pattern -->
  <div class="curtain top-half" #topHalf>
    <div class="curtain-grid"></div>
  </div>
  <div class="curtain bottom-half" #bottomHalf>
    <div class="curtain-grid"></div>
  </div>
  
  <!-- Floating code window -->
  <div class="code-window" #codeWindow>
    <div class="window-header">
      <div class="window-controls">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      <div class="window-title">Simonalbi - portfolio.ts</div>
    </div>
    
    <div class="editor-layout">
      <div class="activity-bar">
        <div class="activity-icon active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
        </div>
        <div class="activity-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </div>
        <div class="activity-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"></circle><circle cx="6" cy="6" r="3"></circle><path d="M13 6h3a2 2 0 0 1 2 2v7"></path><line x1="6" y1="9" x2="6" y2="21"></line></svg>
          <div class="activity-badge">7</div>
        </div>
        <div class="activity-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="7" y="7" width="10" height="12" rx="5"></rect>
            <path d="M19 8l-3 2"></path>
            <path d="M5 8l3 2"></path>
            <path d="M19 18l-3-2"></path>
            <path d="M5 18l3-2"></path>
            <path d="M20 13h-3"></path>
            <path d="M4 13h3"></path>
            <path d="M9.5 4l1 3"></path>
            <path d="M14.5 4l-1 3"></path>
          </svg>
        </div>
      </div>
      
      <div class="main-editor">
        <div class="tabs-bar">
          <div class="tab active">
            <span class="tab-icon ts-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14">
                <rect width="24" height="24" rx="2" fill="currentColor"/>
                <text x="12" y="17" fill="white" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">TS</text>
              </svg>
            </span>
            <span class="tab-name">portfolio.ts</span>
            <svg class="tab-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </div>
          <div class="tab inactive hide-on-mobile">
            <span class="tab-icon js-icon">&lt;/&gt;</span>
            <span class="tab-name">index.html</span>
          </div>
          <div class="tab inactive">
            <span class="tab-icon json-icon">&#123; &#125;</span>
            <span class="tab-name">skills.json</span>
          </div>
        </div>

        <div class="breadcrumbs-bar">
          <span>src</span>
          <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
          <span>app</span>
          <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
          <span class="breadcrumb-icon ts-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="12" height="12">
              <rect width="24" height="24" rx="2" fill="currentColor"/>
              <text x="12" y="17" fill="white" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">TS</text>
            </svg>
          </span>
          <span class="breadcrumb-active">portfolio.ts</span>
        </div>

        <div class="window-body">
          <div class="indent-guide" #indentGuide style="opacity: 0;"></div>
          <div class="code-line">
            <span class="line-number-gutter" style="position: relative;">
              1
              <span class="folding-arrow" #foldingArrow>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </span>
            </span>
            <span class="code-text" #line1></span><span class="cursor" #c1></span>
          </div>
          <div class="code-line">
            <span class="line-number-gutter">2</span>
            <span class="code-text indent-code" #line2></span><span class="cursor hidden" #c2></span>
          </div>
          <div class="code-line">
            <span class="line-number-gutter">3</span>
            <span class="code-text indent-code" #line3></span><span class="cursor hidden" #c3></span>
          </div>
          <div class="code-line">
            <span class="line-number-gutter">4</span>
            <span class="code-text indent-code" #line4></span><span class="cursor hidden" #c4></span>
          </div>
          <div class="code-line">
            <span class="line-number-gutter">5</span>
            <span class="code-text" #line5></span><span class="cursor hidden" #c5></span>
          </div>
      
          <!-- Code Minimap -->
          <div class="minimap">
          <div class="minimap-viewport"></div>
          <div class="mm-line"><div class="mm-kw" style="width: 12px;"></div><div class="mm-func" style="width: 18px;"></div><div class="mm-punct" style="width: 4px;"></div></div>
          <div class="mm-line" style="margin-left: 8px;"><div class="mm-key" style="width: 22px;"></div><div class="mm-str" style="width: 32px;"></div></div>
          <div class="mm-line" style="margin-left: 8px;"><div class="mm-key" style="width: 14px;"></div><div class="mm-str" style="width: 24px;"></div></div>
          <div class="mm-line" style="margin-left: 8px;"><div class="mm-key" style="width: 18px;"></div><div class="mm-str" style="width: 16px;"></div></div>
          <div class="mm-line"><div class="mm-punct" style="width: 8px;"></div></div>
          <div class="mm-line" style="margin-top: 6px;"><div class="mm-kw" style="width: 16px;"></div><div class="mm-obj" style="width: 24px;"></div></div>
          <div class="mm-line" style="margin-left: 8px;"><div class="mm-func" style="width: 20px;"></div><div class="mm-punct" style="width: 4px;"></div></div>
          <div class="mm-line" style="margin-left: 16px;"><div class="mm-str" style="width: 28px;"></div></div>
          <div class="mm-line" style="margin-left: 16px;"><div class="mm-obj" style="width: 14px;"></div><div class="mm-punct" style="width: 6px;"></div></div>
          <div class="mm-line" style="margin-left: 8px;"><div class="mm-punct" style="width: 4px;"></div></div>
          <div class="mm-line" style="margin-top: 6px;"><div class="mm-kw" style="width: 14px;"></div><div class="mm-func" style="width: 22px;"></div></div>
          <div class="mm-line" style="margin-left: 8px;"><div class="mm-str" style="width: 36px;"></div></div>
          <div class="mm-line" style="margin-left: 8px;"><div class="mm-key" style="width: 12px;"></div><div class="mm-obj" style="width: 18px;"></div></div>
          <div class="mm-line"><div class="mm-punct" style="width: 6px;"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-left">
      <span class="status-item remote-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="status-icon"><path d="M10 18l-6-6 6-6"/><path d="M14 6l6 6-6 6"/></svg>
      </span>
        <span class="status-item">main*</span>
        <span class="status-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="status-icon"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.28l5.67-5.67"/></svg>&nbsp;0&darr; 5&uarr;
        </span>
        <span class="status-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="status-icon"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg> 0
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="status-icon" style="margin-left: 8px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg> 1
        </span>
      </div>
      <div class="status-right">
        <span class="status-item" #statusCursorPos>Ln 1, Col 1</span>
        <span class="status-item">Spaces: 2</span>
        <span class="status-item">UTF-8</span>
        <span class="status-item">CRLF</span>
        <span class="status-item">{{ '{ }' }} TypeScript</span>
        <span class="status-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="status-icon"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </span>
      </div>
    </div>
  </div>
</div>
