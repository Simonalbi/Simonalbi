<div class="flex items-center gap-3">
  <div class="logo-container">
    <img [src]="certification.logo">
  </div>

  <div class="flex-1">
    <div class="flex flex-wrap items-center gap-2">
      <h5 class="text-base font-semibold text-primary">{{ certification.name }}</h5>
      <a [href]="certification.url" target="_blank"
        class="inline-flex items-center gap-1 px-3 py-1 text-xs font-medium text-primary bg-slate-50 border border-slate-200 rounded-full hover:bg-accent hover:text-white hover:border-accent transition-all duration-200">
        Show certificate
        <img src="gicons/open_in_new.svg" alt="Certification url" class="w-3.5 h-3.5">
      </a>
    </div>
    <p class="text-sm text-primary/80 mt-0.5">{{ certification.organization }}</p>
    <p class="text-sm text-secondary mt-0.5">{{ certification.date | date: 'MMM y'}}</p>
  </div>
</div>
