<div class="flex items-start gap-3">
  <div class="logo-container mt-1 shrink-0">
    <img [src]="certification.logo" class="w-10 h-10 object-contain" alt="">
  </div>

  <div class="flex-1 min-w-0">
    <h5 class="text-base font-semibold text-primary leading-snug">{{ certification.name }}</h5>
    <p class="text-sm text-primary/80 mt-0.5">{{ certification.organization }}</p>
    
    <div class="flex items-center justify-between gap-2 mt-0.5">
      <p class="text-sm text-secondary">{{ certification.date | date: 'MMM y'}}</p>
      
      <a [href]="certification.url" target="_blank"
        class="inline-flex items-center gap-1.5 px-3 py-1 text-xs font-medium text-primary bg-slate-50 border border-slate-200 rounded-full hover:bg-accent hover:text-white hover:border-accent transition-all duration-200 shrink-0">
        Show
        <img src="gicons/open_in_new.svg" alt="" class="w-3.5 h-3.5" aria-hidden="true">
      </a>
    </div>
  </div>
</div>
